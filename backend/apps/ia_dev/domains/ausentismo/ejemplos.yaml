ejemplos_consulta:
  - consulta: "ausentismos por area"
    interpretacion: "Resumen agrupado por area del rango solicitado."
    capacidad_esperada: "attendance.summary.by_area.v1"
  - consulta: "ausentismos por labor"
    interpretacion: "Resumen agrupado por tipo_labor usando join con empleados."
    capacidad_esperada: "attendance.summary.by_attribute.v1"
  - consulta: "personal incapacitado hoy"
    interpretacion: "Detalle de empleados con justificacion INCAPACIDAD del dia, incluyendo vigencia y campos clinicos si existen."
    capacidad_esperada: "attendance.unjustified.table_with_personal.v1"
  - consulta: "ausentismos por tipo_inca del ultimo mes"
    interpretacion: "Resumen agrupado por tipo_inca para ausentismos de incapacidad en el rango solicitado."
    capacidad_esperada: "attendance.summary.by_attribute.v1"
  - consulta: "ausentismos por causa_aus en incapacidad"
    interpretacion: "Resumen agrupado por causa_aus filtrando justificacion INCAPACIDAD."
    capacidad_esperada: "attendance.summary.by_attribute.v1"
  - consulta: "personal en vacaciones del 2026-04-01 al 2026-04-19"
    interpretacion: "Detalle de empleados con justificacion VACACIONES dentro del rango."
    capacidad_esperada: "attendance.unjustified.table_with_personal.v1"
  - consulta: "ausentismos por area en vacaciones"
    interpretacion: "Resumen agrupado por area filtrando justificacion VACACIONES."
    capacidad_esperada: "attendance.summary.by_area.v1"
